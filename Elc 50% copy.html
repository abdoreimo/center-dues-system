<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث وتوجيه البرنامج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #fffbeb;
            color: #451a03;
            text-align: center;
            padding-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }

        .spinner {
            border: 8px solid #fde68a;
            border-top: 8px solid #f59e0b;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            color: #b45309;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #78350f;
            max-width: 500px;
            line-height: 1.6;
        }

        #status-msg {
            margin-top: 20px;
            font-weight: bold;
            color: #d97706;
        }

        .progress-bar {
            width: 300px;
            height: 6px;
            background: #fde68a;
            border-radius: 3px;
            margin: 15px auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .redirect-btn {
            display: none;
            margin-top: 30px;
            padding: 12px 25px;
            background: #f59e0b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
            transition: all 0.3s;
        }

        .redirect-btn:hover {
            background: #d97706;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="spinner" id="loader"></div>
    <h1>جاري التوجيه للبرنامج الجديد...</h1>
    <p>لقد انتقلنا إلى منصة جديدة أكثر قوة وأماناً. يتم الآن نقل بياناتك المحفوظة تلقائياً.</p>

    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
    <div id="status-msg">جارِ المعالجة ونقل البيانات... ⏳</div>

    <a href="https://elec-adrar01.web.app/" class="redirect-btn" id="manual-redirect">الانتقال للبرنامج الجديد الآن</a>

    <script>
        const NEW_APP_URL = "https://elec-adrar01.web.app/";

        // All localStorage keys used by the app
        const DATA_KEYS = [
            'institutionInfo', 'beneficiaries', 'compensations',
            'compensationsEquipment', 'compensationsTransport',
            'compensationsTraining', 'quarterEnabled'
        ];

        function setProgress(pct) {
            document.getElementById('progress').style.width = pct + '%';
        }

        function getLocalData() {
            const data = {};
            DATA_KEYS.forEach(k => {
                const val = localStorage.getItem(k);
                if (val) {
                    // Parse to object if possible
                    try {
                        data[k] = JSON.parse(val);
                    } catch (e) {
                        data[k] = val;
                    }
                }
            });
            return data;
        }

        // ========== Main Logic ==========
        (function () {
            setProgress(10);

            const allLocalData = getLocalData();
            const hasData = Object.keys(allLocalData).length > 0;

            if (!hasData) {
                // No data - just redirect
                document.getElementById('status-msg').textContent = "لم يتم العثور على بيانات محلية، جاري التوجيه... 🚀";
                setProgress(80);
                document.getElementById('manual-redirect').style.display = 'inline-block';
                setTimeout(() => {
                    window.location.href = NEW_APP_URL;
                }, 1500);
                return;
            }

            // Has data - encode and redirect
            document.getElementById('status-msg').textContent = "تم العثور على بياناتك، جاري تجهيز النقل... 📦";
            setProgress(30);

            setTimeout(() => {
                try {
                    const jsonStr = JSON.stringify(allLocalData);
                    const encoded = encodeURIComponent(jsonStr);

                    setProgress(60);
                    document.getElementById('status-msg').textContent = "جاري التوجيه مع البيانات... 🚀";

                    setTimeout(() => {
                        setProgress(90);
                        document.getElementById('manual-redirect').style.display = 'inline-block';

                        // Redirect with data in hash
                        setTimeout(() => {
                            setProgress(100);
                            window.location.href = NEW_APP_URL + '#migrate=' + encoded;
                        }, 500);
                    }, 500);

                } catch (err) {
                    console.error("Encoding error:", err);
                    document.getElementById('status-msg').textContent = "جاري التوجيه... 🚀";
                    setProgress(100);
                    document.getElementById('manual-redirect').style.display = 'inline-block';
                    setTimeout(() => {
                        window.location.href = NEW_APP_URL;
                    }, 1500);
                }
            }, 500);
        })();
    </script>
</body>

</html>
